<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>前端知识库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="前端知识库">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- Custom styles -->
  <style>
    :root {
      --theme-color: #42b983;
      --theme-color-dark: #2d8060;
    }
    
    .sidebar-nav > ul > li > p {
      font-weight: 600;
      font-size: 1.1em;
    }
    
    .markdown-section code {
      background-color: #f8f8f8;
      padding: 2px 6px;
      border-radius: 3px;
    }
    
    .markdown-section pre {
      background-color: #f8f8f8;
      padding: 16px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  
  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <!-- Code highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-css.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  
  <!-- External link plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
  
  <!-- Emoji support -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  
  <!-- Docsify config -->
  <script>
    window.$docsify = {
      name: '前端知识库',
      repo: 'https://github.com/suilang/fe-started-to-buried',
      loadSidebar: '_sidebar.md',
      loadNavbar: '_navbar.md',
      homepage: 'README.md',
      
      // Sidebar configuration
      alias: {
        '/.*/_sidebar.md': '_sidebar.md'
      },
      
      // Search configuration
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '没有找到结果',
        depth: 6
      },
      
      // Pagination
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true,
        crossChapterText: true,
      },
      
      // Other settings
      auto2top: true,
      subMaxLevel: 3,
      coverpage: false,
      
      // Router mode
      routerMode: 'hash'
    }
  </script>
</body>
</html>
